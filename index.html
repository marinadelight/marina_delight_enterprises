<style>
@import url('https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap');

html,body{margin:0;padding:0;}

:root{
  --navy-900:#0E2340;
  --navy-800:#153157;
  --navy-700:#1B3A63;
  --navy-500:#2C5282;
  --gold-500:#C9A227;
  --gold-300:#E4C468;
  --gold-100:#F7EDCB;
  --bg:#F3F5F8;
  --card:#FFFFFF;
  --text:#1A2233;
  --muted:#6B7686;
  --border:#E3E7EE;
  --green:#1F8A5F;
  --green-bg:#E7F5EE;
  --amber:#B7791B;
  --amber-bg:#FBF0DD;
  --red:#C0392B;
  --red-bg:#FBEAE8;
}
*{box-sizing:border-box;}
#mdapp{
  font-family:'Inter',sans-serif;
  color:var(--text);
  background:var(--bg);
  position:fixed;
  top:0;
  left:0;
  right:0;
  bottom:0;
  display:flex;
  overflow:hidden;
  border:1px solid var(--border);
}
#mdapp .mono{font-family:'JetBrains Mono',monospace;}
#mdapp .serif{font-family:'Fraunces',serif;}

/* ---------- Sidebar ---------- */
.md-sidebar{
  width:250px;
  flex-shrink:0;
  background:linear-gradient(180deg,var(--navy-900),var(--navy-800));
  color:#fff;
  display:flex;
  flex-direction:column;
  padding:20px 14px;
  overflow-y:auto;
}
.md-brand{
  display:flex;flex-direction:column;align-items:center;text-align:center;gap:12px;
  padding:22px 14px 18px;
  background:linear-gradient(180deg,#ffffff,#fbf8f0);
  border-radius:14px;
  border:1px solid var(--gold-300);
  box-shadow:0 6px 18px rgba(0,0,0,0.18), inset 0 0 0 1px rgba(201,162,39,0.15);
  margin:-2px -2px 18px;
  min-width:0;
}
.md-brand-text{min-width:0;flex:1;}
.md-brand-text{min-width:0;flex:1;}
.md-brand-name{font-family:'Fraunces',serif;font-weight:600;font-size:14px;line-height:1.25;word-wrap:break-word;color:var(--navy-800);}
.md-nav{display:flex;flex-direction:column;gap:2px;flex:1;}
.md-nav-item{
  display:flex;align-items:center;gap:10px;
  padding:9px 12px;border-radius:8px;cursor:pointer;
  font-size:13.5px;color:rgba(255,255,255,0.72);font-weight:500;
  transition:background .15s,color .15s;
}
.md-nav-item:hover{background:rgba(255,255,255,0.08);color:#fff;}
.md-nav-item.active{background:rgba(255,255,255,0.14);color:#fff;}
.md-nav-item svg{width:16px;height:16px;flex-shrink:0;}
.md-new-btn{
  margin-top:14px;background:var(--gold-500);color:var(--navy-900);
  border:none;padding:10px 12px;border-radius:8px;font-weight:700;font-size:13px;
  cursor:pointer;display:flex;align-items:center;justify-content:center;gap:6px;
}
.md-new-btn:hover{background:var(--gold-300);}
.md-btn svg, .md-new-btn svg, .md-icon-btn svg{width:14px;height:14px;flex-shrink:0;display:inline-block;vertical-align:middle;}
.md-sidebar-footer{font-size:10.5px;color:rgba(255,255,255,0.4);padding-top:14px;margin-top:14px;border-top:1px solid rgba(255,255,255,0.1);}

/* ---------- Main ---------- */
.md-main{flex:1;min-height:0;padding:0 30px 26px;overflow-y:auto;}
.md-main.flex-fill{display:flex;flex-direction:column;}
.md-topbar{
  display:flex;justify-content:space-between;align-items:flex-start;
  padding-top:26px;
  margin-bottom:22px;
}
.md-topbar.sticky{
  margin:0 -30px 22px;
  padding:26px 30px 16px;
  position:sticky;
  top:0;
  z-index:10;
  background:var(--bg);
}
.md-title{font-family:'Fraunces',serif;font-size:22px;font-weight:600;}
.md-subtitle{font-size:12.5px;color:var(--muted);margin-top:2px;}

/* KPI cards */
.md-kpi-row{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:22px;}
.md-kpi{
  background:var(--card);border:1px solid var(--border);border-radius:12px;padding:14px 16px;
  position:relative;overflow:hidden;
  display:flex;align-items:center;gap:12px;
  box-shadow:0 1px 2px rgba(14,35,64,0.04);
}
.md-kpi::before{
  content:'';position:absolute;top:0;left:0;right:0;height:3px;
  background:var(--kpi-accent, var(--navy-700));
}
.md-kpi-icon{
  width:34px;height:34px;border-radius:9px;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
  background:var(--kpi-accent-bg, var(--gold-100));
  color:var(--kpi-accent, var(--navy-700));
}
.md-kpi-icon svg{width:17px;height:17px;}
.md-kpi-label{font-size:10.5px;color:var(--muted);text-transform:uppercase;letter-spacing:.04em;font-weight:700;}
.md-kpi-value{font-family:'JetBrains Mono',monospace;font-size:21px;font-weight:700;margin-top:2px;color:var(--navy-900);}
.md-kpi-sub{font-size:11px;color:var(--muted);margin-top:3px;}
.md-kpi-sub-inline{font-size:11.5px;font-weight:600;color:var(--kpi-accent, var(--muted));margin-left:8px;font-family:'Inter',sans-serif;}

/* card / table */
.md-card{background:var(--card);border:1px solid var(--border);border-radius:10px;overflow:hidden;margin-bottom:18px;}
.md-card-head{display:flex;justify-content:space-between;align-items:center;padding:14px 16px;border-bottom:1px solid var(--border);}
.md-card-head h3{font-size:14px;font-weight:700;margin:0;}
table.md-table{width:100%;border-collapse:collapse;font-size:13px;}
table.md-table th{text-align:left;font-size:10.5px;text-transform:uppercase;letter-spacing:.03em;color:var(--muted);padding:9px 16px;border-bottom:1px solid var(--border);font-weight:700;background:#FAFBFC;}
table.md-table td{padding:11px 16px;border-bottom:1px solid var(--border);vertical-align:middle;}
table.md-table tr:last-child td{border-bottom:none;}
table.md-table tr.clickable{cursor:pointer;}
table.md-table tr.clickable:hover{background:#F8F9FB;}
.md-table-scroll{flex:1;min-height:200px;overflow-y:auto;}
.md-card-fill{display:flex;flex-direction:column;flex:1;min-height:0;}
.md-table-scroll table.md-table thead th{position:sticky;top:0;z-index:2;}
.md-empty{padding:34px 16px;text-align:center;color:var(--muted);font-size:13px;}

.md-badge{display:inline-flex;align-items:center;gap:5px;padding:3px 9px;border-radius:20px;font-size:11px;font-weight:700;}
.md-badge.paid{background:var(--green-bg);color:var(--green);}
.md-badge.pending{background:var(--amber-bg);color:var(--amber);}
.md-badge.overdue{background:var(--red-bg);color:var(--red);}
.md-badge-dot{width:6px;height:6px;border-radius:50%;background:currentColor;}

.md-btn{border:1px solid var(--border);background:#fff;padding:7px 12px;border-radius:7px;font-size:12.5px;font-weight:600;cursor:pointer;color:var(--text);}
.md-btn:hover{background:#F5F6F8;}
.md-btn.primary{background:var(--navy-800);color:#fff;border-color:var(--navy-800);}
.md-btn.primary:hover{background:var(--navy-700);}
.md-btn.danger{color:var(--red);}
.md-btn.small{padding:4px 9px;font-size:11.5px;}
.md-icon-btn{background:none;border:none;cursor:pointer;color:var(--muted);padding:4px;border-radius:6px;}
.md-icon-btn:hover{background:#F0F1F4;color:var(--text);}

.md-search{padding:8px 12px;border:1px solid var(--border);border-radius:7px;font-size:12.5px;font-family:'Inter';width:200px;}

/* forms */
.md-form-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;padding:18px;}
.md-form-grid.full{grid-template-columns:1fr;}
.md-field{display:flex;flex-direction:column;gap:5px;}
.md-field label{font-size:11.5px;font-weight:600;color:var(--muted);}
.md-field input,.md-field select,.md-field textarea{
  padding:8px 10px;border:1px solid var(--border);border-radius:7px;font-size:13px;font-family:'Inter';color:var(--text);
}
.md-field textarea{resize:vertical;min-height:54px;}
.md-form-actions{display:flex;justify-content:flex-end;gap:8px;padding:14px 18px;border-top:1px solid var(--border);background:#FAFBFC;}

.md-items-table{width:100%;border-collapse:collapse;margin:0 18px 8px;width:calc(100% - 36px);}
.md-items-table th{font-size:10.5px;text-transform:uppercase;color:var(--muted);text-align:left;padding:6px 6px;}
.md-items-table td{padding:5px 6px;}
.md-items-table input,.md-items-table select{width:100%;padding:6px 8px;border:1px solid var(--border);border-radius:6px;font-size:12.5px;}
.md-items-table input.num{font-family:'JetBrains Mono',monospace;text-align:right;}
.md-add-row{margin:0 18px 16px;}

.md-totals-box{margin:0 18px 18px;margin-left:auto;width:280px;background:#FAFBFC;border:1px solid var(--border);border-radius:8px;padding:12px 14px;}
.md-totals-row{display:flex;justify-content:space-between;font-size:12.5px;padding:4px 0;color:var(--muted);}
.md-totals-row.total{border-top:1px solid var(--border);margin-top:6px;padding-top:8px;font-weight:700;color:var(--text);font-size:14px;}
.md-totals-row .mono{font-family:'JetBrains Mono',monospace;}

/* Modal */
.md-modal-backdrop{position:fixed;inset:0;background:rgba(14,35,64,0.45);display:flex;align-items:center;justify-content:center;z-index:50;}
.md-modal{background:#fff;border-radius:12px;width:420px;max-width:90vw;overflow:hidden;}
.md-modal-head{padding:16px 18px;border-bottom:1px solid var(--border);font-weight:700;font-size:14.5px;}
.md-modal-body{padding:18px;font-size:13px;color:var(--muted);}
.md-modal-actions{display:flex;justify-content:flex-end;gap:8px;padding:14px 18px;border-top:1px solid var(--border);}

/* ---------- Invoice preview (matches sample look) ---------- */
.inv-wrap{background:#fff;max-width:794px;margin:0 auto;border:1px solid var(--border);border-radius:8px;overflow:hidden;box-shadow:0 1px 3px rgba(14,35,64,0.08);position:relative;}
.inv-header{display:flex;border-bottom:3px solid var(--gold-500);}
.inv-logo-col{width:150px;display:flex;align-items:center;justify-content:center;padding:24px;}
.inv-mid-col{flex:1;min-width:0;background:var(--navy-800);color:#fff;padding:28px 26px;display:flex;flex-direction:column;justify-content:center;}
.inv-mid-col h1{font-family:'Fraunces',serif;font-size:18px;margin:0;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.inv-mid-col .tagline{font-size:10.5px;letter-spacing:.05em;text-transform:uppercase;color:var(--gold-300);margin-top:3px;}
.inv-right-col{width:220px;background:var(--navy-900);color:#fff;padding:28px 20px;display:flex;flex-direction:column;justify-content:center;align-items:flex-end;text-align:right;}
.inv-right-col .big{font-family:'Fraunces',serif;font-size:20px;font-weight:700;letter-spacing:.03em;}
.inv-right-col .num{font-size:10px;color:rgba(255,255,255,0.65);margin-top:4px;font-family:'JetBrains Mono',monospace;white-space:nowrap;}
.inv-meta-row{display:flex;border-bottom:1px solid var(--border);}
.inv-meta{flex:1;padding:18px 22px;border-right:1px solid var(--border);}
.inv-meta:last-child{border-right:none;}
.inv-meta .l{font-size:9.5px;text-transform:uppercase;letter-spacing:.05em;color:var(--gold-500);font-weight:700;}
.inv-meta .v{font-size:13px;font-weight:600;margin-top:3px;color:var(--navy-900);}
.inv-parties{display:flex;padding:30px 22px;gap:30px;}
.inv-party{flex:1;}
.inv-party .l{font-size:9.5px;text-transform:uppercase;letter-spacing:.05em;color:var(--gold-500);font-weight:700;margin-bottom:6px;}
.inv-party .name{font-family:'Fraunces',serif;font-weight:600;font-size:15px;margin-bottom:4px;color:var(--navy-900);}
.inv-party .line{font-size:12px;color:var(--muted);line-height:1.5;}
.inv-items{padding:0 22px;}
table.inv-table{width:100%;border-collapse:collapse;}
table.inv-table th{background:var(--navy-900);color:#fff;font-size:9.5px;text-transform:uppercase;letter-spacing:.06em;padding:9px 10px;text-align:left;}
table.inv-table th.r{text-align:right;}
table.inv-table td{padding:20px 10px;font-size:12.5px;border-bottom:1px solid var(--border);vertical-align:top;}
table.inv-table td.r{text-align:right;font-family:'JetBrains Mono',monospace;color:var(--navy-900);font-weight:600;}
table.inv-table .desc-sub{color:var(--muted);font-size:11px;margin-top:3px;line-height:1.5;}
.inv-totals-wrap{display:flex;justify-content:flex-end;padding:28px 22px 4px;}
.inv-totals{width:280px;}
.inv-totals-row{display:flex;justify-content:space-between;padding:6px 4px;font-size:12.5px;color:var(--muted);}
.inv-totals-row .mono{font-family:'JetBrains Mono',monospace;}
.inv-total-final{display:flex;justify-content:space-between;background:var(--gold-100);padding:13px 14px;border-radius:6px;margin-top:8px;align-items:center;}
.inv-total-final .l{font-size:10px;text-transform:uppercase;letter-spacing:.05em;font-weight:700;color:var(--navy-800);}
.inv-total-final .amt{font-family:'JetBrains Mono',monospace;font-weight:700;font-size:17px;color:var(--navy-900);}
.inv-transfer{padding:28px 22px 36px;display:flex;gap:30px;border-top:1px solid var(--border);}
.inv-transfer-details{flex:1;}
.inv-transfer .l{font-size:9.5px;text-transform:uppercase;letter-spacing:.05em;color:var(--gold-500);font-weight:700;margin-bottom:8px;}
.inv-transfer-row{display:flex;font-size:12px;padding:3px 0;}
.inv-transfer-row .k{width:120px;color:var(--muted);}
.inv-transfer-row .v{font-weight:600;color:var(--navy-900);}
.inv-seal{width:110px;height:110px;flex-shrink:0;}
.inv-sign{width:170px;text-align:left;}
.inv-sign .l{font-size:9.5px;text-transform:uppercase;letter-spacing:.05em;color:var(--muted);font-weight:700;margin-bottom:22px;}
.inv-sign .line{border-top:1px solid var(--muted);padding-top:6px;font-family:'Fraunces',serif;font-size:12px;font-style:italic;color:var(--muted);}
.inv-footer{background:var(--navy-900);color:var(--gold-300);text-align:center;padding:18px;font-family:'Fraunces',serif;font-weight:600;font-size:14px;letter-spacing:.02em;}
.inv-stamp{
  position:absolute;top:190px;right:60px;width:120px;height:120px;
  border:3px solid var(--green);border-radius:50%;color:var(--green);
  display:flex;align-items:center;justify-content:center;text-align:center;
  transform:rotate(-14deg);opacity:0.85;font-weight:800;font-size:15px;
  letter-spacing:.06em;text-transform:uppercase;
}
.inv-stamp::before{content:'';position:absolute;inset:6px;border:1px solid var(--green);border-radius:50%;}
.inv-stamp.pending{border-color:var(--amber);color:var(--amber);}
.inv-stamp.pending::before{border-color:var(--amber);}
.inv-preview-toolbar{display:flex;justify-content:space-between;align-items:center;padding-top:26px;margin-bottom:14px;}

@media (max-width: 720px){
  #mdapp{flex-direction:column;border-radius:0;}
  .md-sidebar{width:100%;flex-direction:row;flex-wrap:wrap;align-items:center;padding:12px;gap:10px;}
  .md-brand{flex-direction:row;margin:0;padding:8px 10px;flex:1;min-width:140px;text-align:left;gap:10px;}
  .md-brand img{width:36px !important;}
  .md-nav{flex-direction:row;flex-wrap:wrap;flex:none;width:100%;order:3;gap:4px;}
  .md-nav-item{flex:1;min-width:80px;justify-content:center;padding:8px 6px;font-size:12px;}
  .md-nav-item span{display:none;}
  .md-new-btn{margin-top:0;width:auto;order:2;padding:9px 14px;}
  .md-sidebar-footer{display:none;}
  .md-main{padding:0 16px 16px;max-height:none;overflow-y:visible;}
  .md-topbar{flex-wrap:wrap;gap:10px;align-items:flex-start;padding-top:16px;}
  .md-topbar.sticky{margin:0 -16px 16px;padding:16px 16px 12px;}
  .md-topbar > button, .md-topbar > div > button{width:100%;}
  .md-kpi-row{grid-template-columns:repeat(2,1fr);}
  .md-card-head{flex-wrap:wrap;gap:8px;}
  .md-card-head > div{width:100%;}
  .md-search{width:100%;}
  .md-form-grid{grid-template-columns:1fr;}
  table.md-table{display:block;overflow-x:auto;white-space:nowrap;}
  .md-items-table{display:block;overflow-x:auto;}
  .md-totals-box{width:100%;margin-left:0;}
  .inv-wrap{max-width:100%;}
  .inv-header{flex-direction:column;}
  .inv-logo-col{width:100%;padding:10px;}
  .inv-mid-col,.inv-right-col{align-items:center;text-align:center;padding:16px;}
  .inv-meta-row{flex-direction:column;}
  .inv-meta{border-right:none;border-bottom:1px solid var(--border);}
  .inv-parties{flex-direction:column;gap:16px;}
  .inv-transfer{flex-direction:column;align-items:flex-start;gap:20px;}
  .inv-preview-toolbar{flex-wrap:wrap;gap:8px;padding-top:16px;}
  .inv-preview-toolbar > div{width:100%;display:flex;flex-wrap:wrap;gap:8px;}
  .inv-preview-toolbar > div > button{flex:1;}
}
@media print{
  @page{ size: A4; margin: 12mm; }
  #mdapp .md-sidebar,#mdapp .md-topbar,#mdapp .inv-preview-toolbar{display:none !important;}
  #mdapp .md-main{padding:0;max-height:none;overflow:visible;}
  #mdapp{position:static;border:none;border-radius:0;height:auto;}
  .inv-wrap{border:none;border-radius:0;box-shadow:none;max-width:none;width:100%;}
}
.md-loading{padding:60px;text-align:center;color:var(--muted);font-size:13px;}
</style>

<div id="mdapp"><div class="md-loading">Loading your invoices…</div></div>

<script>
(function(){
  let state = null;
  let view = 'dashboard';
  let editingInvoiceId = null;
  let editingClientId = null;
  let viewingClientId = null;
  let previewInvoiceId = null;
  let presetClientId = null;
  let confirmDeleteFn = null;
  let invClientFilter = '';

  const DESCRIPTION_OPTIONS = ['Placement Fees – Skilled Worker', 'Enrollment Fees – Education'];
  const PAYMENT_OPTIONS = ['1st payment','2nd payment','3rd payment','4th payment'];
  const TRANSFER_METHODS = ['KBZ Bank','AYA Bank','CB Bank','Kpay','Wave Pay','Other'];
  const STAGE_BY_PAYMENT_PLACEMENT = {
    '1st payment':'Initial Process of Candidates',
    '2nd payment':'Screening & Selection of Candidates',
    '3rd payment':'Candidates Permit Granted',
    '4th payment':'Recruited'
  };
  const STAGE_BY_PAYMENT_EDUCATION = {
    '1st payment':'Initial process of Students',
    '2nd payment':'Screening & Selection of Students',
    '3rd payment':'Students Permit Granted',
    '4th payment':'Enrolled'
  };
  const CATEGORY_BY_PAYMENT = {
    '1st payment':'Deposit',
    '2nd payment':'Placement',
    '3rd payment':'Approved',
    '4th payment':'Success'
  };
  function stageMapFor(description){
    return description === DESCRIPTION_OPTIONS[1] ? STAGE_BY_PAYMENT_EDUCATION : STAGE_BY_PAYMENT_PLACEMENT;
  }
  function paymentDigit(paymentStr){
    const m = /^(\d+)/.exec(paymentStr||'');
    return m ? Number(m[1]) : 1;
  }
  function formatPaymentOrdinal(paymentStr){
    const m = /^(\d+)(st|nd|rd|th)\b(.*)$/i.exec(paymentStr||'');

  async function loadState(){
    const url = getSyncUrl();
    if(!url){ renderSyncSetup(); return; }
    try{
      const res = await fetch(url, {method:'GET'});
      if(!res.ok) throw new Error('Server responded with ' + res.status);
      const data = await res.json();
      state = {
        settings: Object.assign(defaultState().settings, data.settings || {}),
        clients: data.clients || [],
        invoices: data.invoices || [],
        invoiceSeq: data.invoiceSeq || 1
      };
    }catch(e){
      renderSyncSetup('Could not load data from that URL (' + e.message + '). Double check the Web App URL and that it\'s deployed with "Anyone" access, then try again.');
      return;
    }
    if(state.settings && !state.settings.signatoryName){
      state.settings.signatoryName = 'W.H.Naing';
    }
    render();
  }

    const url = getSyncUrl();

    try{

        method:'POST',

        body: JSON.stringify(state)

  function fmtMoney(n, currency){
    const sym = CURRENCIES[currency] || '';
    const num = Number(n||0).toLocaleString(undefined,{minimumFractionDigits:2,maximumFractionDigits:2});
    return currency==='MMK' ? num+' '+sym : sym+num;
  }

  function computeTotals(inv){
    const subtotal = inv.items.reduce((s,it)=> s + (Number(it.amount)||0), 0);
    const discount = subtotal * ((Number(inv.discountPercent)||0)/100);
    const total = subtotal - discount;
    return {subtotal, discount, total};
  }

  function totalsCurrency(inv){
    const it = inv.items && inv.items[0];
    return (it && (it.amountCurrency || it.unitPriceCurrency)) || inv.currency;
  }

  function invoiceStatusInfo(inv){
    if(inv.status === 'Paid') return {cls:'paid', label:'Paid'};
    const today = new Date().toISOString().slice(0,10);
    if(inv.paymentDate && inv.paymentDate < today) return {cls:'overdue', label:'Overdue'};
    return {cls:'pending', label:'Pending'};
  }

  function generateInvoiceNo(clientId, issueDateStr, excludeInvoiceId, paymentNumberOverride, clientNameOverride){
    const client = state.clients.find(c=>c.id===clientId);
    const initials = clientInitials(clientNameOverride || (client ? client.name : ''));
    const d = issueDateStr ? new Date(issueDateStr+'T00:00:00') : new Date();
    const year = isNaN(d.getTime()) ? new Date().getFullYear() : d.getFullYear();
    const month = isNaN(d.getTime()) ? (new Date().getMonth()+1) : (d.getMonth()+1);
    const monthStr = String(month).padStart(3,'0');
    const paymentNo = paymentNumberOverride || (state.invoices.filter(i=> i.clientId===clientId && i.id!==excludeInvoiceId).length + 1);
    const prefix = (state.settings.invoicePrefix || 'MDE').toUpperCase();
    return `${prefix}-${year}-${monthStr}-${initials}/CP${paymentNo}`;
  }

  function esc(s){
    return (s==null?'':String(s)).replace(/[&<>"']/g, m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
  }

  function renderColumnChart(data){
    if(!data.length) return `<div class="md-empty">No data yet.</div>`;
    const max = Math.max(...data.map(d=>d[1]));
    const barW = 40, gap = 20, chartH = 82, labelH = 68, topPad = 28;
    const w = data.length*(barW+gap)+gap;
    const bars = data.map((d,i)=>{
      const [label,count] = d;
      const h = max ? (count/max)*chartH : 0;
      const x = gap + i*(barW+gap);
      const y = topPad + (chartH - h);
      return `
        <g>
          <rect x="${x}" y="${y}" width="${barW}" height="${Math.max(h,2)}" rx="5" fill="url(#barGrad)"/>
          <text x="${x+barW/2}" y="${y-8}" text-anchor="middle" font-size="11" font-weight="700" fill="#0E2340" font-family="'JetBrains Mono',monospace">${count}</text>
          <text x="${x+barW/2}" y="${topPad+chartH+16}" text-anchor="end" font-size="10.5" fill="#6B7686" font-family="'Inter',sans-serif" transform="rotate(-40 ${x+barW/2} ${topPad+chartH+16})">${esc(label)}</text>
        </g>
      `;
    }).join('');
    return `<svg viewBox="0 0 ${w} ${topPad+chartH+labelH}" style="width:100%;height:${topPad+chartH+labelH}px;overflow:visible;display:block;">
      <defs><linearGradient id="barGrad" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%" stop-color="#2C5282"/>
        <stop offset="100%" stop-color="#0E2340"/>
      </linearGradient></defs>
      ${bars}
    </svg>`;
  }

  function renderDonutChart(segments, total){
    if(!total) return `<div class="md-empty">No data yet.</div>`;
    const r = 44, cx = 54, cy = 54, strokeW = 10, circumference = 2*Math.PI*r;
    const gapDeg = 3;
    const gapLen = (gapDeg/360)*circumference;
    let offset = 0;
    const active = segments.filter(s=>s.value>0);
    const arcs = active.map(s=>{
      const frac = s.value/total;
      const dash = Math.max(frac*circumference - gapLen, 0);
      const el = `<circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="${s.color}" stroke-width="${strokeW}" stroke-linecap="round" stroke-dasharray="${dash} ${circumference-dash}" stroke-dashoffset="${-offset}" transform="rotate(-90 ${cx} ${cy})"/>`;
      offset += frac*circumference;
      return el;
    }).join('');
    const legend = segments.map(s=>{
      const p = total ? Math.round(s.value/total*100) : 0;
      return `
      <div style="display:flex;align-items:center;gap:8px;font-size:12px;color:var(--text);padding:6px 0;border-bottom:1px solid var(--border);">
        <span style="width:8px;height:8px;border-radius:2px;background:${s.color};display:inline-block;flex-shrink:0;"></span>
        <span style="flex:1;">${esc(s.label)}</span>
        <span style="color:var(--muted);font-size:11px;">${p}%</span>
        <span style="width:32px;text-align:right;font-family:'JetBrains Mono',monospace;font-weight:600;">${s.value}</span>
      </div>
    `;}).join('');
    return `
      <div style="display:flex;align-items:center;gap:20px;">
        <svg viewBox="0 0 108 108" style="width:96px;height:96px;flex-shrink:0;">${arcs}
          <text x="54" y="50" text-anchor="middle" font-size="17" font-weight="700" fill="#0E2340" font-family="'JetBrains Mono',monospace">${total}</text>
          <text x="54" y="64" text-anchor="middle" font-size="8" fill="#6B7686" letter-spacing="0.5" font-family="'Inter',sans-serif">TOTAL</text>
        </svg>
        <div style="flex:1;">${legend}</div>
      </div>
    `;
  }

  // ---------------- DASHBOARD ----------------
  function renderDashboard(){
    const parseDateSafe = (v) => {
      if(!v) return null;
      const s = String(v);
      const isoDay = s.match(/^\d{4}-\d{2}-\d{2}/);
      const d = isoDay ? new Date(isoDay[0]+'T00:00:00') : new Date(s);
      return isNaN(d.getTime()) ? null : d;
    };
    const total = state.clients.length;
    const statusOf = (c) => String(c.status||'').trim();
    const onProcess = state.clients.filter(c=>statusOf(c)==='On Process').length;
    const success = state.clients.filter(c=>statusOf(c)==='Success').length;
    const cancelled = state.clients.filter(c=>statusOf(c)==='Cancelled').length;
    const counts = [onProcess, success, cancelled];
    const pcts = total ? (() => {
      const raw = counts.map(n => n/total*100);
      const floored = raw.map(Math.floor);
      let remaining = 100 - floored.reduce((a,b)=>a+b,0);
      const order = raw.map((v,i)=>({i, frac:v-floored[i]})).sort((a,b)=>b.frac-a.frac);
      const result = [...floored];
      for(let k=0;k<order.length && k<remaining;k++){ result[order[k].i]++; }
      return result;
    })() : [0,0,0];
    const pct = (idx) => total ? pcts[idx]+'% of total' : '—';
    const kpiCard = (label, value, sub, accent, accentBg, icon) => `
      <div class="md-kpi" style="--kpi-accent:${accent};--kpi-accent-bg:${accentBg};">
        <div class="md-kpi-icon">${icon}</div>
        <div>
          <div class="md-kpi-label">${label}</div>
          <div class="md-kpi-value">${value}${sub ? `<span class="md-kpi-sub-inline">${sub}</span>` : ''}</div>
        </div>
      </div>
    `;
    const iconUsers = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>`;
    const iconClock = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>`;
    const iconCheck = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>`;
    const iconX = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg>`;

    const posCounts = {};
    state.clients.forEach(c=>{ const p = c.appliedPosition || 'Other'; posCounts[p] = (posCounts[p]||0)+1; });
    const posData = Object.entries(posCounts).sort((a,b)=>b[1]-a[1]);

    const countryCounts = {};
    state.clients.forEach(c=>{ const k = c.destinationCountry || 'Other'; countryCounts[k] = (countryCounts[k]||0)+1; });
    const countryData = Object.entries(countryCounts).sort((a,b)=>b[1]-a[1]);

    const monthCounts = {}; const monthOrder = [];
    for(let m=5;m>=0;m--){
      const d = new Date(); d.setDate(1); d.setMonth(d.getMonth()-m);
      const key = d.toLocaleString('en-US',{month:'short'})+" '"+String(d.getFullYear()).slice(2);
      monthOrder.push(key); monthCounts[key] = 0;
    }
    state.clients.forEach(c=>{
      const d = parseDateSafe(c.createdAt);
      if(!d) return;
      const key = d.toLocaleString('en-US',{month:'short'})+" '"+String(d.getFullYear()).slice(2);
      if(key in monthCounts) monthCounts[key]++;
    });
    const trendData = monthOrder.map(l=>[l, monthCounts[l]]);

    const closed = success + cancelled;
    const convRate = closed ? Math.round(success/closed*100) : null;

    const todayD = new Date();
    const daysSince = (dateVal) => { const d = parseDateSafe(dateVal); return d ? Math.floor((todayD - d) / 86400000) : null; };
    const onProcessWithDate = state.clients.filter(c=>statusOf(c)==='On Process' && parseDateSafe(c.createdAt));
    const closedWithDates = state.clients.filter(c=>statusOf(c)!=='On Process' && parseDateSafe(c.createdAt) && parseDateSafe(c.statusChangedAt));
    const durations = [
      ...onProcessWithDate.map(c=>daysSince(c.createdAt)).filter(v=>v!==null),
      ...closedWithDates.map(c=>Math.max(0, Math.floor((parseDateSafe(c.statusChangedAt) - parseDateSafe(c.createdAt))/86400000)))
    ];

          <div class="md-subtitle">Your workspace at a glance</div>

        ${kpiCard('Total clients', total, 'On file', 'var(--navy-700)', 'var(--gold-100)', iconUsers)}
        ${kpiCard('On process', onProcess, pct(0), 'var(--amber)', 'var(--amber-bg)', iconClock)}
        ${kpiCard('Success', success, pct(1), 'var(--green)', 'var(--green-bg)', iconCheck)}
        ${kpiCard('Cancelled', cancelled, pct(2), 'var(--red)', 'var(--red-bg)', iconX)}
      </div>
      <div class="md-card" style="padding:20px;">
        <h3 style="margin:0 0 18px;font-size:14px;font-weight:700;">Applied position</h3>
        ${renderColumnChart(posData)}
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;align-items:stretch;margin-bottom:18px;">
        <div class="md-card" style="padding:20px;margin-bottom:0;">
          <h3 style="margin:0 0 16px;font-size:14px;font-weight:700;">Destination country</h3>
          ${renderHBarChart(countryData)}
        </div>
        <div class="md-card" style="padding:20px;margin-bottom:0;display:flex;flex-direction:column;">
          <h3 style="margin:0 0 18px;font-size:14px;font-weight:700;">New candidates by month</h3>
          <div style="flex:1;display:flex;align-items:center;">${renderColumnChart(trendData)}</div>
        </div>
      </div>
      <div style="display:grid;grid-template-columns:1fr 2fr;gap:16px;align-items:stretch;">
        <div style="display:flex;flex-direction:column;gap:16px;height:100%;">
          <div class="md-card" style="padding:20px;margin-bottom:0;flex:1;min-height:0;display:flex;flex-direction:column;justify-content:center;">
            <h3 style="margin:0 0 16px;font-size:14px;font-weight:700;">Success rate</h3>
            ${convRate===null ? `<div class="md-empty">No closed candidates yet.</div>` : `
              <div style="font-family:'JetBrains Mono',monospace;font-size:36px;font-weight:700;color:var(--green);">${convRate}%</div>
              <div style="font-size:11.5px;color:var(--muted);margin-bottom:14px;">${success} success of ${closed} closed candidates</div>
              <div style="background:#F3F5F8;border-radius:6px;height:10px;overflow:hidden;display:flex;">
                <div style="width:${convRate}%;background:var(--green);"></div>
                <div style="width:${100-convRate}%;background:var(--red);opacity:0.55;"></div>
              </div>

  // ---------------- PUBLIC API ----------------
  window.mdApp = {
    nav(v){ view = v; editingInvoiceId=null; editingClientId=null; viewingClientId=null; render(); },
    newClient(){ editingClientId=null; view='client-form'; render(); },
    viewClient(id){ viewingClientId=id; view='client-detail'; render(); },
    editClient(id){ editingClientId=id; view='client-form'; render(); },
    setClientSearch(v){ clientSearch=v; renderMain(); const el=document.querySelector('.md-search'); el.focus(); el.setSelectionRange(el.value.length, el.value.length); },
    saveClient(){
      const name = document.getElementById('cf-name').value.trim();
      const phone = document.getElementById('cf-phone').value.trim();
      const address = document.getElementById('cf-address').value.trim();
      const nationality = document.getElementById('cf-nationality').value.trim();
      const destinationCountry = document.getElementById('cf-destination').value.trim();
      const appliedPosition = document.getElementById('cf-position').value.trim();
      const emergencyName = document.getElementById('cf-ec-name').value.trim();
      const emergencyRelationship = document.getElementById('cf-ec-relationship').value.trim();
      const emergencyMobile = document.getElementById('cf-ec-mobile').value.trim();
      const emergencyWhatsapp = document.getElementById('cf-ec-whatsapp').value.trim();
      const emergencyEmail = document.getElementById('cf-ec-email').value.trim();
      const emergencyAddress = document.getElementById('cf-ec-address').value.trim();
      if(!name){ showWarning('Please enter a client name.'); return; }
      if(!phone){ showWarning('Please enter a phone number.'); return; }
      if(!address){ showWarning('Please enter an address.'); return; }
      if(!nationality){ showWarning('Please enter nationality.'); return; }
      if(!destinationCountry){ showWarning('Please enter destination country.'); return; }
      if(!appliedPosition){ showWarning('Please enter applied position.'); return; }
      if(!emergencyName){ showWarning('Please enter emergency contact name.'); return; }
      if(!emergencyRelationship){ showWarning('Please enter emergency contact relationship.'); return; }
      if(!emergencyMobile){ showWarning('Please enter emergency contact mobile number.'); return; }
      if(!emergencyWhatsapp){ showWarning('Please enter emergency contact WhatsApp number.'); return; }
      if(!emergencyEmail){ showWarning('Please enter emergency contact email.'); return; }
      if(!emergencyAddress){ showWarning('Please enter emergency contact address.'); return; }
      const data = {
        name,
        phone,
        email: document.getElementById('cf-email').value.trim(),
        address,
        nationality,
        destinationCountry,
        appliedPosition,
        status: document.getElementById('cf-status').value,
        emergencyName,
        emergencyRelationship,
        emergencyMobile,
        emergencyWhatsapp,
        emergencyEmail,
        emergencyAddress,
        pccCountry: document.getElementById('cf-pcc-country').value,
        pccMethod: document.getElementById('cf-pcc-method').value,
        pccApplyDate: document.getElementById('cf-pcc-apply').value,
        pccReceivedDate: document.getElementById('cf-pcc-received').value,
        pccStatus: document.getElementById('cf-pcc-status').value,
        visaDate: document.getElementById('cf-visa-date').value,
        visaStatus: document.getElementById('cf-visa-status').value,
        interviewRound: document.getElementById('cf-interview-round').value.trim(),
        interviewDate: document.getElementById('cf-interview-date').value,
        interviewStatus: document.getElementById('cf-interview-status').value
      };
      if(editingClientId){
        const c = state.clients.find(c=>c.id===editingClientId);
        if(c.status !== data.status){
          data.statusChangedAt = new Date().toISOString().slice(0,10);
        }
        const priorHistory = visaHistoryList(c);
        if(data.visaStatus){
          const entryDate = data.visaDate || new Date().toISOString().slice(0,10);
          if(c.visaStatus !== data.visaStatus){
            data.visaHistory = [...priorHistory, {status: data.visaStatus, date: entryDate}];
          } else if(priorHistory.length && priorHistory[priorHistory.length-1].date !== entryDate){
            data.visaHistory = [...priorHistory.slice(0,-1), {status: data.visaStatus, date: entryDate}];
          } else {
            data.visaHistory = priorHistory;
          }
        } else {
          data.visaHistory = priorHistory;
        }
        const priorInterviewHistory = interviewHistoryList(c);
        if(data.interviewStatus){
          const ientryDate = data.interviewDate || new Date().toISOString().slice(0,10);
          if(c.interviewStatus !== data.interviewStatus || c.interviewRound !== data.interviewRound){
            data.interviewHistory = [...priorInterviewHistory, {round: data.interviewRound, status: data.interviewStatus, date: ientryDate}];
          } else if(priorInterviewHistory.length && priorInterviewHistory[priorInterviewHistory.length-1].date !== ientryDate){
            data.interviewHistory = [...priorInterviewHistory.slice(0,-1), {round: data.interviewRound, status: data.interviewStatus, date: ientryDate}];
          } else {
            data.interviewHistory = priorInterviewHistory;
          }
        } else {
          data.interviewHistory = priorInterviewHistory;
        }
        Object.assign(c, data);
        saveState();
        if(viewingClientId===editingClientId){ view='client-detail'; render(); return; }
      } else {
        const nowStr = new Date().toISOString().slice(0,10);
        if(data.visaStatus){
          data.visaHistory = [{status: data.visaStatus, date: data.visaDate || nowStr}];
        }
        if(data.interviewStatus){
          data.interviewHistory = [{round: data.interviewRound, status: data.interviewStatus, date: data.interviewDate || nowStr}];
        }
        state.clients.push({id:uid(), createdAt:nowStr, statusChangedAt:nowStr, ...data});
        saveState();
      }
      view='clients'; render();
    },
    confirmDeleteClient(id){
      const c = state.clients.find(c=>c.id===id);
      const count = state.invoices.filter(i=>i.clientId===id).length;

    addItemRow(){
      const payment = PAYMENT_OPTIONS[0];
      const stage = stageMapFor(DESCRIPTION_OPTIONS[0])[payment];
      window.__mdDraft.items.push({id:uid(), description:DESCRIPTION_OPTIONS[0], payment, stage, category:CATEGORY_BY_PAYMENT[payment], qty:1, unitPrice:0, unitPriceCurrency:window.__mdDraft.currency, amount:0, amountCurrency:window.__mdDraft.currency});

    removeItemRow(idx){
      if(window.__mdDraft.items.length<=1) return;
      window.__mdDraft.items.splice(idx,1);
      document.getElementById('if-items-body').innerHTML = window.__mdDraft.items.map((it,idx2)=>itemRow(it,idx2,window.__mdDraft.currency)).join('');
      document.getElementById('if-totals').innerHTML = totalsHtml(window.__mdDraft);
    },
    onDescriptionSelect(idx, value){
      const items = window.__mdDraft.items;
      if(value === '__blank__'){
        items[idx].descBlank = true;
        items[idx].description = '';
        items[idx].payment = '';
        items[idx].stage = '';
        items[idx].category = '';
      } else {
        items[idx].descBlank = false;
        items[idx].description = value;
        items[idx].payment = PAYMENT_OPTIONS.includes(items[idx].payment) && items[idx].payment ? items[idx].payment : PAYMENT_OPTIONS[0];
        items[idx].stage = stageMapFor(value)[items[idx].payment];
        items[idx].category = CATEGORY_BY_PAYMENT[items[idx].payment];
      }
      document.getElementById('if-items-body').innerHTML = items.map((it,i)=>itemRow(it,i,window.__mdDraft.currency)).join('');
      document.getElementById('if-totals').innerHTML = totalsHtml(window.__mdDraft);
      if(idx===0 && !editingInvoiceId) mdApp.regenerateInvoiceNo();
    },
    updateItem(idx, field, value){
      const items = window.__mdDraft.items;
      if(field==='descriptionSelect'){ mdApp.onDescriptionSelect(idx, value); return; }
      if(field==='qty' || field==='unitPrice' || field==='amount'){
        items[idx][field] = Number(value);
        if(field==='amount'){
          // Amount is entered manually (unit price may be in a different currency), so only totals need refreshing — never rebuild inputs mid-keystroke.
          document.getElementById('if-totals').innerHTML = totalsHtml(window.__mdDraft);
        }
        return;
      }
      if(field==='unitPriceCurrency' || field==='amountCurrency' || field==='description' || field==='category'){
        // Free-text/value edits that don't change the row's structure — store directly, no rebuild (avoids losing input focus mid-keystroke).
        items[idx][field] = value;
        return;
      }
      items[idx][field] = value;
      if(field==='payment'){
        items[idx].stage = stageMapFor(items[idx].description)[value];
        items[idx].category = CATEGORY_BY_PAYMENT[value];
      }
      // Payment is a discrete <select> change, so a full row rebuild here is safe (no cursor to lose).
      document.getElementById('if-items-body').innerHTML = items.map((it,i)=>itemRow(it,i,window.__mdDraft.currency)).join('');
      document.getElementById('if-totals').innerHTML = totalsHtml(window.__mdDraft);
      if(field==='payment' && idx===0 && !editingInvoiceId) mdApp.regenerateInvoiceNo();
    },

      inv.paymentDate = document.getElementById('if-due').value;

      inv.transferAccountNumber = document.getElementById('if-transfer-number').value.trim();

      if(!inv.paymentDate){ showWarning('Please enter the payment due date.'); return; }
      if(!inv.transferAccountName){ showWarning('Please enter the transfer account name.'); return; }
      if(!inv.transferAccountNumber){ showWarning('Please enter the transfer account number.'); return; }

      if(inv.clientId === '__new__'){
        const name = document.getElementById('if-new-name').value.trim();
        const phone = document.getElementById('if-new-phone').value.trim();
        const address = document.getElementById('if-new-address').value.trim();
        if(!name){ showWarning('Please enter the candidate\'s name.'); return; }
        if(!phone){ showWarning('Please enter the candidate\'s phone number.'); return; }

          name,
          phone,
          email: document.getElementById('if-new-email').value.trim(),
          address
        };
        state.clients.push(newClient);
        inv.clientId = newClient.id;

      if(!inv.clientId){ showWarning('Please add the candidate\'s details.'); return; }
      if(!inv.items.some(it=>it.description.trim())){ showWarning('Add at least one line item with a description.'); return; }

      if(editingInvoiceId){
        const i = state.invoices.findIndex(x=>x.id===editingInvoiceId);
        state.invoices[i] = inv;
      } else {
        state.invoices.push(inv);
        state.invoiceSeq += 1;

      saveState();
      previewInvoiceId = inv.id;
      view='invoice-preview'; render();

    downloadInvoiceJpg(evt){
      const el = document.querySelector('.inv-wrap');
      if(!el){ alert('Could not find the invoice to export.'); return; }
      const inv = state.invoices.find(i=>i.id===previewInvoiceId);
      const filename = ((inv && inv.invoiceNo) ? inv.invoiceNo.replace(/[^\w.-]+/g,'_') : 'invoice') + '.jpg';
      const btn = evt && evt.target ? evt.target.closest('button') : null;
      const oldLabel = btn ? btn.textContent : '';
      if(btn){ btn.textContent = 'Preparing…'; btn.disabled = true; }
      const restoreBtn = () => { if(btn){ btn.textContent = oldLabel; btn.disabled = false; } };
      const runExport = () => {
        window.html2canvas(el, {scale:2, backgroundColor:'#ffffff', useCORS:true}).then((canvas) => {
          const link = document.createElement('a');
          link.download = filename;
          link.href = canvas.toDataURL('image/jpeg', 0.95);
          document.body.appendChild(link);
          link.click();
          document.body.removeChild(link);
          restoreBtn();
        }).catch(() => {
          alert('Could not generate the image. Please try again.');
          restoreBtn();
        });
      };
      if(window.html2canvas){ runExport(); return; }
      const script = document.createElement('script');
      script.src = 'https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js';
      script.onload = runExport;
      script.onerror = () => { alert('Could not load the image export library. Check your connection and try again.'); restoreBtn(); };
      document.head.appendChild(script);

    buildExportTables(){
      const clientHeaders = ['Name','Phone','Email','Address','Nationality','Destination country','Applied position','Status','Registered','Emergency contact name','Emergency relationship','Emergency mobile','Emergency WhatsApp','Emergency email','Emergency address'];
      const clientRows = state.clients.map(c=>[c.name,c.phone,c.email,c.address,c.nationality,c.destinationCountry,c.appliedPosition,c.status,c.createdAt,c.emergencyName,c.emergencyRelationship,c.emergencyMobile,c.emergencyWhatsapp,c.emergencyEmail,c.emergencyAddress]);
      const invHeaders = ['Invoice No','Client','Issue date','Payment date','Status','Stage','Category','Description','Payment','Currency','Amount','Transfer method'];
      const invRows = state.invoices.map(inv=>{
        const fi = inv.items && inv.items[0] ? inv.items[0] : {};
        const t = computeTotals(inv).total;
        return [inv.invoiceNo, clientName(inv.clientId), inv.issueDate, inv.paymentDate, inv.status, fi.stage, fi.category, fi.description, fi.payment, totalsCurrency(inv), t, inv.transferMethod];
      });
      return {clientHeaders, clientRows, invHeaders, invRows};
    },
    exportCSV(){
      const {clientHeaders, clientRows, invHeaders, invRows} = this.buildExportTables();
      const toCSV = (headers, rows) => {
        const esc2 = (v) => {
          v = v===undefined||v===null ? '' : String(v);
          return /[",\n]/.test(v) ? '"'+v.replace(/"/g,'""')+'"' : v;
        };
        return [headers, ...rows].map(r=>r.map(esc2).join(',')).join('\r\n');
      };
      const download = (filename, text) => {
        const blob = new Blob([text], {type:'text/csv;charset=utf-8;'});
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url; a.download = filename;
        document.body.appendChild(a); a.click(); document.body.removeChild(a);
        URL.revokeObjectURL(url);
      };
      const today = new Date().toISOString().slice(0,10);
      download('clients-'+today+'.csv', toCSV(clientHeaders, clientRows));
      setTimeout(()=> download('invoices-'+today+'.csv', toCSV(invHeaders, invRows)), 300);
    },
    exportExcel(){
      const {clientHeaders, clientRows, invHeaders, invRows} = this.buildExportTables();
      const build = () => {
        const wb = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet([clientHeaders, ...clientRows]), 'Clients');
        XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet([invHeaders, ...invRows]), 'Invoices');
        XLSX.writeFile(wb, 'marine-delight-export-'+new Date().toISOString().slice(0,10)+'.xlsx');
      };
      if(window.XLSX){ build(); return; }
      const script = document.createElement('script');
      script.src = 'https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js';
      script.onload = build;
      script.onerror = () => alert('Could not load the Excel export library. Check your connection and try again.');
      document.head.appendChild(script);
    },

    loadSampleData(){
      const currency = state.settings.defaultCurrency || 'MMK';
      const today = new Date();
      const dateStr = (daysAgo) => { const d = new Date(today); d.setDate(d.getDate()-daysAgo); return d.toISOString().slice(0,10); };
      const rand = (arr) => arr[Math.floor(Math.random()*arr.length)];
      const randInt = (min,max) => Math.floor(Math.random()*(max-min+1))+min;

      const firstNames = ['Aung','Zaw','Thura','Kyaw','Htet','Myo','Nay','Win','Thet','Soe','Thiri','Su','Ei','Hnin','Cho','Khin','May','Nilar','Yamin','Chit'];
      const lastNames = ['Aung','Zaw','Htun','Win','Myint','Naing','Oo','Kyaw','Thant','Soe','San','Latt','Moe','Tun','Hlaing'];
      const cities = ['Yangon, Myanmar','Mandalay, Myanmar','Naypyidaw, Myanmar','Bago, Myanmar','Mawlamyine, Myanmar','Taunggyi, Myanmar','Pathein, Myanmar','Monywa, Myanmar'];
      const countries = ['Thailand','Japan','South Korea','Singapore','Malaysia','Qatar','UAE','Saudi Arabia'];
      const positions = ['Factory Worker','Caregiver','Construction Worker','Domestic Worker','Fisherman','Welder','Electrician','Hotel Staff','Farm Worker','Warehouse Staff'];
      const statuses = ['On Process','On Process','On Process','Success','Success','Success','Success','Success','Cancelled'];

      const usedNames = new Set();
      const makeName = () => {
        let n;
        do { n = rand(firstNames)+' '+rand(lastNames); } while(usedNames.has(n));
        usedNames.add(n);
        return n;
      };

      const numClients = 200;
      const relationships = ['Father','Mother','Spouse','Sibling','Uncle','Aunt','Cousin','Friend'];
      const sampleClients = [];
      for(let i=0;i<numClients;i++){
        const name = makeName();
        const createdDaysAgo = randInt(0,240);
        const status = rand(statuses);
        const client = {
          id: uid(),
          name,
          phone: '+95 9'+randInt(400000000,799999999),
          email: Math.random()<0.7 ? name.toLowerCase().replace(' ','')+'@example.com' : '',
          address: rand(cities),
          nationality: 'Myanmar',
          destinationCountry: rand(countries),
          appliedPosition: rand(positions),
          status,
          createdAt: dateStr(createdDaysAgo),
          emergencyName: rand(firstNames)+' '+rand(lastNames),
          emergencyRelationship: rand(relationships),
          emergencyMobile: '+95 9'+randInt(400000000,799999999),
          emergencyWhatsapp: '+95 9'+randInt(400000000,799999999),
          emergencyEmail: Math.random()<0.5 ? 'contact'+randInt(100,999)+'@example.com' : '',
          emergencyAddress: rand(cities)
        };
        client.statusChangedAt = status==='On Process' ? client.createdAt : dateStr(Math.max(0, createdDaysAgo - randInt(30,120)));
        sampleClients.push(client);
      }
      state.clients.push(...sampleClients);

      const makeInvoice = (client, paymentIdx, description, status, daysAgo, unitPrice) => {
        const payment = PAYMENT_OPTIONS[paymentIdx];
        const stage = stageMapFor(description)[payment];
        const category = CATEGORY_BY_PAYMENT[payment];
        const issueDate = dateStr(daysAgo);
        return {
          id: uid(),
          invoiceNo: generateInvoiceNo(client.id, issueDate, null, paymentIdx+1),
          clientId: client.id,
          issueDate,
          paymentDate: dateStr(Math.max(daysAgo-7,0)),
          status,
          currency,
          discountPercent:0,
          transferMethod: rand(TRANSFER_METHODS.slice(0,5)),
          transferAccountName: state.settings.companyName,
          transferAccountNumber: '0'+randInt(100000000,999999999),
          items:[{id:uid(), description, payment, stage, category, qty:1, unitPrice, unitPriceCurrency:currency, amount:unitPrice, amountCurrency:currency}]
        };
      };

      const totalInvoices = 450;
      const sampleInvoices = [];
      for(let i=0;i<totalInvoices;i++){
        const client = rand(sampleClients);
        const paymentIdx = randInt(0,3);
        const description = rand(DESCRIPTION_OPTIONS);
        const status = rand(['Paid','Paid','Pending']);
        const daysAgo = randInt(0,365);
        const unitPrice = randInt(15,60)*10000;
        sampleInvoices.push(makeInvoice(client, paymentIdx, description, status, daysAgo, unitPrice));
      }
      state.invoices.push(...sampleInvoices);
      state.invoiceSeq += sampleInvoices.length;
      saveState();
      view = 'dashboard';
      render();
    },
    confirmClearAllData(){
      renderConfirmModal('Delete <strong>all clients and invoices</strong>? Your Settings will be kept. This cannot be undone.', ()=>{
        state.clients = [];
        state.invoices = [];
        state.invoiceSeq = 1;
        saveState();
        view = 'dashboard';
        render();
      });
    },
    connectSync(){
      const val = document.getElementById('sync-url-input').value.trim();
      if(!val){ showWarning('Please paste the Web App URL.'); return; }
      if(!/^https:\/\/script\.google\.com\/macros\/s\/.+\/exec$/.test(val)){
        showWarning('That doesn\'t look like a Google Apps Script Web App URL. It should look like https://script.google.com/macros/s/.../exec');
        return;
      }
      setSyncUrl(val);
      document.getElementById('mdapp').innerHTML = '<div class="md-loading">Connecting…</div>';
      loadState();
    },
    disconnectSync(){
      renderConfirmModal('Disconnect from this Google Sheet? You can reconnect (to this one or a different one) any time.', ()=>{
        localStorage.removeItem('mdSyncUrl');
        location.reload();
      });
    },
    closeConfirm(){
      const el = document.getElementById('mdConfirmModal');
      if(el) el.remove();
      confirmDeleteFn = null;
    },
    closeWarning(){
      const el = document.getElementById('mdWarningModal');
      if(el) el.remove();
    },
    runConfirm(){
      if(confirmDeleteFn) confirmDeleteFn();
      mdApp.closeConfirm();
    }
  };

  loadState();
})();
</script>
